[paths]
#input = "inputs/pano_aiypnfgomckrgf.jpg"
input = "inputs/starry_night.jpg"
#input = "inputs/symmetrical_garden_02_8k.jpg"
output_root = "outputs"

[panorama]
width = 2048
height = 1024
input_fov_x = 70.0

[view]
size = 512
middle_fov = 85.0
vertical_fov = 120.0

[models]
inpaint_model_id = "stabilityai/stable-diffusion-2-inpainting"
refine_model_id = "stabilityai/stable-diffusion-2-1-base"

[vlm]
base_url = "http://127.0.0.1:11435/v1"
model = "qwen3.6"
api_key = "ollama"
http_referer = ""
title = ""

[prompting]
mode = "directional"

[synthesis]
seed = 42
num_steps = 40
guidance_scale = 7.5
mask_dilate_kernel = 5
mask_dilate_iterations = 1
overlap_blend = true

[refinement]
enabled = true
steps = 30
guidance_scale = 7.5
denoise_strength = 0.3
